name: Release XCFramework

# Run manually (Actions tab → "Release XCFramework" → Run workflow) with a
# version tag like `v0.1.0`. The workflow:
#   1. Builds ios/UnifiedQuery.xcframework via scripts/build-xcframework.sh
#   2. On a detached HEAD off of main, rewrites the BINARY-TARGET block in
#      Package.swift to the `binaryTarget(url:checksum:)` form pointing at the
#      release asset
#   3. Tags that detached commit with the version, pushes ONLY the tag
#      (`main` itself is left untouched so local dev / swift-tests CI keep
#      using the path-based form without SwiftPM manifest cache friction)
#   4. Publishes a GitHub Release with the zip attached
#
# Because the workflow creates the tag (not the developer), the checksum
# baked into the tagged Package.swift always matches the asset attached to
# that same tag — no force-push of an existing tag is required.

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release tag (e.g. v0.1.0)'
        required: true
        type: string

jobs:
  release:
    name: Build and publish xcframework
    runs-on: macos-14
    timeout-minutes: 60
    permissions:
      contents: write

    steps:
      - name: Validate version input
        run: |
          if [[ ! "${{ inputs.version }}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.-]+)?$ ]]; then
            echo "Expected version of the form vMAJOR.MINOR.PATCH[-prerelease], got: ${{ inputs.version }}" >&2
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Fail if tag already exists
        run: |
          if git ls-remote --tags origin "refs/tags/${{ inputs.version }}" | grep -q .; then
            echo "Tag ${{ inputs.version }} already exists on origin — bump the version or delete the existing tag first." >&2
            exit 1
          fi

      - name: Show toolchain versions
        run: |
          xcodebuild -version
          swift --version

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,aarch64-apple-ios,aarch64-apple-ios-sim,x86_64-apple-ios

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: core

      - name: Build xcframework + zip
        run: bash scripts/build-xcframework.sh

      - name: Read checksum
        id: checksum
        run: |
          value="$(cat ios/UnifiedQuery.xcframework.zip.sha256)"
          echo "value=$value" >> "$GITHUB_OUTPUT"
          echo "Checksum: $value"

      - name: Rewrite Package.swift BINARY-TARGET block to URL form
        env:
          VERSION: ${{ inputs.version }}
          CHECKSUM: ${{ steps.checksum.outputs.value }}
          REPO: ${{ github.repository }}
        run: |
          set -eux
          URL="https://github.com/${REPO}/releases/download/${VERSION}/UnifiedQuery.xcframework.zip"
          python3 - <<'PY'
          import os, re, pathlib
          url = os.environ["URL"]
          checksum = os.environ["CHECKSUM"]
          path = pathlib.Path("Package.swift")
          text = path.read_text()
          replacement = (
              f'// --- BINARY-TARGET START ---\n'
              f'let unfydqryBinaryTarget: Target = .binaryTarget(\n'
              f'    name: "unfydqryFFI",\n'
              f'    url: "{url}",\n'
              f'    checksum: "{checksum}"\n'
              f')\n'
              f'// --- BINARY-TARGET END ---'
          )
          new_text, n = re.subn(
              r'// --- BINARY-TARGET START ---.*?// --- BINARY-TARGET END ---',
              replacement,
              text,
              count=1,
              flags=re.DOTALL,
          )
          if n != 1:
              raise SystemExit("Could not locate BINARY-TARGET block in Package.swift")
          path.write_text(new_text)
          PY
          git diff -- Package.swift

      - name: Sanity-check the rewritten manifest
        run: swift package dump-package > /dev/null

      - name: Commit on detached HEAD and tag
        env:
          VERSION: ${{ inputs.version }}
        run: |
          set -eux
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Package.swift
          # Detached-HEAD commit: this commit is NOT pushed to main.
          # Only the tag pointing at it is pushed.
          git commit -m "release: pin Package.swift to ${VERSION}"
          git tag -a "${VERSION}" -m "${VERSION}"
          git push origin "refs/tags/${VERSION}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: ${{ inputs.version }}
          generate_release_notes: true
          files: ios/UnifiedQuery.xcframework.zip
